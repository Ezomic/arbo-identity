name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  phpstan:
    name: PHPStan & Pint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pgsql, pdo_pgsql, bcmath, ctype, fileinfo, json, mbstring, openssl, tokenizer, xml
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --level=7 --memory-limit=512M

      - name: Run Pint (check only)
        run: ./vendor/bin/pint --test
